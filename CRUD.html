<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="CRUD.css">
</head>
<body>

<div class="crud">

<div class="head"> 
    <h2>CRUD</h2>
    <p>PRODUCT MANAGMENT SYSTEM</p>
</div>

<div class="inputs">
<input type="text" name="" id="title" placeholder="title">
<div class="price">
<input onkeyup="getTotal()" type="text" name="" id="price" placeholder="price">
<input onkeyup="getTotal()" type="text" name="" id="taxes" placeholder="taxes">
<input onkeyup="getTotal()" type="text" name="" id="ads" placeholder="ads">
<input onkeyup="getTotal()" type="text" name="" id="discount" placeholder="discount">
<small  id="total"></small>
</div> 
<input type="number" name="" id="count" placeholder="count">
<input type="text" name="" id="catagory" placeholder="catagory">
<button id="submit">create</button>

</div>

<div class="outputs">
<div class="searchBlock">
    <input onkeyup="searchDats (this.value)" type="text" name="" id="search" placeholder="search">
    <div class="btnSearch">
<button onclick="getSearchMood (this.id)" id="searchTitle">Search By Title</button>
<button onclick="getSearchMood (this.id)" id="searchCategory">Search By Category</button>
</div>
</div>

<div id="deleteAll">

</div>


<table>
<thead>
    <tr>
        <th>Select</th>
        <th>ID</th>
        <th>Title</th>
        <th>Price</th>
        <th>Taxes</th>
        <th>Ads</th>
        <th>Discount</th>
        <th>Total</th>
        <th>Category</th>
        <th>Date</th> <th>Update</th>
        <th>Delete</th>
    </tr>
</thead>

<tbody id="tbody">

</tbody>


</table>








</div>






</div>
